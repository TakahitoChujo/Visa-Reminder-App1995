<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="favBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3366FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5BFF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background with rounded corners for favicon -->
  <rect width="48" height="48" rx="8" ry="8" fill="url(#favBg)" />

  <!-- Simplified calendar + bell icon for small size -->
  <g transform="translate(24, 25)">
    <!-- Calendar body -->
    <rect x="-12" y="-8" width="24" height="24" rx="3" ry="3" fill="#FFFFFF" opacity="0.95" />

    <!-- Calendar header -->
    <rect x="-12" y="-8" width="24" height="7" rx="3" ry="3" fill="#FFFFFF" />

    <!-- Calendar binding rings -->
    <rect x="-6" y="-11" width="2.5" height="5" rx="1.25" fill="#FFFFFF" opacity="0.9" />
    <rect x="3.5" y="-11" width="2.5" height="5" rx="1.25" fill="#FFFFFF" opacity="0.9" />

    <!-- Calendar date dots - simplified grid -->
    <circle cx="-5" cy="5" r="1.8" fill="#E8EEFF" />
    <circle cx="0" cy="5" r="1.8" fill="#E8EEFF" />
    <circle cx="5" cy="5" r="1.8" fill="#E8EEFF" />

    <!-- Highlighted date -->
    <circle cx="-5" cy="11" r="2.5" fill="#2E5BFF" />
    <circle cx="0" cy="11" r="1.8" fill="#E8EEFF" />
    <circle cx="5" cy="11" r="1.8" fill="#E8EEFF" />

    <!-- Small bell indicator top-right -->
    <g transform="translate(13, -12)">
      <path d="M0 -4 C0 -4, -4 -1, -4 3 C-4 5, -4 6, -6 7 L6 7 C4 6, 4 5, 4 3 C4 -1, 0 -4, 0 -4 Z"
            fill="#FFFFFF" opacity="0.95" />
      <circle cx="0" cy="-5" r="1.5" fill="#FFFFFF" opacity="0.95" />
      <circle cx="0" cy="8.5" r="2" fill="#FFFFFF" opacity="0.95" />
      <!-- Alert dot -->
      <circle cx="4.5" cy="-3" r="2.5" fill="#EF4444" />
    </g>
  </g>
</svg>